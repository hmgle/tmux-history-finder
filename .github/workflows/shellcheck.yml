name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck tmux fzf
      - name: Run shellcheck
        run: |
          shellcheck -x --source-path=SCRIPTDIR \
            tnx \
            tmux_nexus.tmux \
            scripts/*.sh \
            tests/*.sh
      - name: Run installer tests
        run: bash tests/install-binary.sh
      - name: Run shell quoting tests
        run: bash tests/shell-quoting.sh
      - name: Check formatting
        run: cargo fmt --check
      - name: Run tests
        run: cargo test --locked
      - name: Build
        run: cargo build --locked
      - name: Run tmux integration tests
        run: bash tests/tmux-integration.sh
      - name: Run manager integration tests
        run: bash tests/manage-integration.sh
